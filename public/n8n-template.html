<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n 工作流模板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Source+Code+Pro:wght@400;600&display=swap"
        rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0D1117;
            --primary-color: #388BFD;
            /* A slightly brighter, techy blue */
            --font-color: #C9D1D9;
            --font-color-secondary: #8B949E;
            --card-bg-color: rgba(22, 27, 34, 0.8);
            --label-bg-color: rgba(56, 139, 253, 0.1);
            --border-color: rgba(56, 139, 253, 0.2);
            --shadow-color-light: rgba(0, 0, 0, 0.3);
            --shadow-color-heavy: rgba(0, 0, 0, 0.5);
            --grid-color: rgba(56, 139, 253, 0.07);
        }

        @keyframes element-fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes grid-pan {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 50px 50px;
            }
        }

        @keyframes scan-glow {
            from {
                box-shadow: 0 0 0 0px rgba(56, 139, 253, 0);
            }

            to {
                box-shadow: 0 0 0 4px rgba(56, 139, 253, 0.2);
            }
        }

        html, body {
            font-family: 'Noto Sans SC', 'SF Pro SC', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--font-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            /* Hide scrollbars from background element */
        }

        /* 导航栏样式 */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: #2E2E2E;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin: 0;
            padding: 0;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 45px;
        }

        .site-brand .brand-link {
            font-size: 20px;
            font-weight: 600;
            color: #FFFFFF;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .site-brand .brand-link:hover {
            color: #388BFD;
        }

        .main-nav .nav-list {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .main-nav .nav-item a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s ease;
            padding: 8px 0;
        }

        .main-nav .nav-item a:hover {
            color: #388BFD;
        }

        

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-nav {
                display: none;
            }
            
            .header-container {
                padding: 0 15px;
            }
            
            .site-brand .brand-link {
                font-size: 18px;
            }
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-pan 8s linear infinite;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            height: calc(100vh - 45px);
            overflow-y: auto;
            padding: 2rem;
            /* Restore padding here */
        }

        /* Custom scrollbar */
        .container::-webkit-scrollbar {
            width: 8px;
        }

        .container::-webkit-scrollbar-track {
            background: transparent;
        }

        .container::-webkit-scrollbar-thumb {
            background-color: rgba(56, 139, 253, 0.3);
            border-radius: 4px;
        }

        .container::-webkit-scrollbar-thumb:hover {
            background-color: rgba(56, 139, 253, 0.5);
        }


        header {
            text-align: center;
            padding-top: 4rem;
            margin-bottom: 2rem;
            /* Adjusted margin */
            animation: element-fade-in 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        header h1 {
            font-family: 'Source Code Pro', monospace;
            font-size: clamp(2rem, 6vw, 3rem);
            color: #fff;
            font-weight: 600;
            margin-bottom: 0.5em;
            white-space: nowrap;
            overflow: hidden;
        }

        header p {
            font-size: 1.2rem;
            color: var(--font-color-secondary);
        }

        .upload-section {
            text-align: center;
            margin: 2rem 0;
            animation: element-fade-in 1s cubic-bezier(0.25, 1, 0.5, 1) 0.2s forwards;
            opacity: 0;
        }

        .file-upload-label {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: var(--primary-color);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-label:hover {
            background-color: #0077ED;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.2);
        }

        #file-input {
            display: none;
        }

        .main-content {
            display: none;
            /* Hide main content initially */
        }

        .search-box {
            margin: 2rem auto;
            position: relative;
            max-width: 600px;
        }

        #search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--font-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box;
            -webkit-appearance: none;
            backdrop-filter: blur(5px);
        }

        #search-input::placeholder {
            color: var(--font-color-secondary);
        }

        #search-input:focus {
            border-color: var(--primary-color);
            background-color: rgba(22, 27, 34, 1);
            animation: scan-glow 0.3s forwards;
        }

        #filter-tags-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 1.5rem;
        }

        .filter-tag {
            background-color: transparent;
            color: var(--font-color-secondary);
            padding: 8px 18px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(20px);
            animation: element-fade-in 0.5s ease forwards;
            position: relative;
            margin-bottom: 10px;
        }

        .filter-tag:hover {
            color: #fff;
            border-color: var(--primary-color);
        }

        .filter-tag.active {
            background-color: var(--label-bg-color);
            color: var(--primary-color);
            border-color: var(--primary-color);
            font-weight: 600;
        }

        #results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding-bottom: 4rem;
            /* Ensure last row is visible */
        }

        .workflow-card {
            background: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px var(--shadow-color-light);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            animation: element-fade-in 0.5s ease forwards;
            position: relative;
            backdrop-filter: blur(5px);
            overflow: hidden;
        }

        .workflow-card::before,
        .workflow-card::after {
            /* Scanline effect */
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-color);
            opacity: 0.6;
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.6, 0.01, 0, 1);
        }

        .workflow-card::before {
            top: 0;
            transform-origin: left;
        }

        .workflow-card::after {
            bottom: 0;
            transform-origin: right;
        }

        .workflow-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px var(--shadow-color-heavy);
        }

        .workflow-card:hover::before,
        .workflow-card:hover::after {
            transform: scaleX(1);
        }

        .workflow-card h3 {
            font-family: 'Source Code Pro', monospace;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--font-color);
            font-weight: 600;
            word-break: break-all;
        }

        .workflow-card .labels {
            margin-bottom: 15px;
            flex-wrap: wrap;
            display: flex;
            gap: 8px;
        }

        .workflow-card .label {
            background-color: var(--label-bg-color);
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .workflow-card p {
            margin-bottom: 0;
            font-size: 0.95em;
            color: var(--font-color-secondary);
            flex-grow: 1;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2em;
            padding: 50px;
            color: var(--font-color-secondary);
            background-color: var(--card-bg-color);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 2rem 0;
            padding: 1rem 0;
        }

        .pagination-btn {
            padding: 8px 16px;
            background-color: var(--card-bg-color);
            color: var(--font-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .pagination-btn:hover:not(:disabled) {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-numbers {
            display: flex;
            gap: 5px;
        }

        .page-number {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg-color);
            color: var(--font-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .page-number:hover {
            background-color: rgba(56, 139, 253, 0.1);
            border-color: var(--primary-color);
        }

        .page-number.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }

        .pagination-info {
            color: var(--font-color-secondary);
            font-size: 0.9rem;
            margin: 0 1rem;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border-color);
            color: var(--font-color-secondary);
            opacity: 0.7;
        }

        /* 浮动按钮样式 */
        .floating-cta {
            position: fixed;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            animation: float-breathing 3s ease-in-out infinite;
        }

        .floating-cta a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
            color: white;
            text-decoration: none;
            padding: 0.7rem 0.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4),
                        0 0 30px rgba(99, 102, 241, 0.2),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            min-width: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .floating-cta a::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
            background-size: 400% 400%;
            border-radius: 1.5rem;
            z-index: -1;
            animation: border-flow 3s linear infinite;
            opacity: 0.7;
        }

        .floating-cta a:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6),
                        0 0 40px rgba(139, 92, 246, 0.4),
                        inset 0 0 25px rgba(255, 255, 255, 0.2);
        }

        .floating-cta .icon {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.5));
        }

        .floating-cta .text {
            font-size: 0.65rem;
            font-weight: 600;
            text-align: center;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* 呼吸灯动画 */
        @keyframes float-breathing {
            0%, 100% {
                transform: translateY(-50%);
            }
            50% {
                transform: translateY(-50%) translateY(-3px);
            }
        }

        /* 动态渐变动画 */
        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 流动边框动画 */
        @keyframes border-flow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .floating-cta {
                right: 0.8rem;
            }
            
            .floating-cta a {
                padding: 0.6rem 0.4rem;
                min-width: 50px;
                border-radius: 1.2rem;
            }
            
            .floating-cta a::before {
                border-radius: 1.2rem;
            }
            
            .floating-cta .icon {
                font-size: 1rem;
            }
            
            .floating-cta .text {
                font-size: 0.55rem;
            }
        }

        /* 密码验证界面样式 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .password-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .password-container {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px var(--shadow-color-heavy);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: element-fade-in 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .password-container h2 {
            color: var(--font-color);
            margin-bottom: 1rem;
            font-family: 'Source Code Pro', monospace;
            font-size: 1.5rem;
        }

        .password-container p {
            color: var(--font-color-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .qrcode-container {
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        .qrcode-container img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .password-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(22, 27, 34, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--font-color);
            font-size: 1rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(56, 139, 253, 0.2);
        }

        .password-submit {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .password-submit:hover {
            background-color: #0077ED;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .password-error {
            color: #ff6b6b;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .main-content-wrapper {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .main-content-wrapper.unlocked {
            opacity: 1;
            pointer-events: auto;
        }

        /* 下载按钮样式 */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .download-btn:hover {
            background-color: #0077ED;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn.downloading {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .download-btn.downloading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 6px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 错误弹窗样式 */
        .error-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .error-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .error-modal-content {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px var(--shadow-color-heavy);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: element-fade-in 0.3s ease forwards;
        }

        .error-modal-content h3 {
            color: var(--font-color);
            margin-bottom: 1rem;
            font-family: 'Source Code Pro', monospace;
            font-size: 1.3rem;
        }

        .error-modal-content p {
            color: var(--font-color-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .error-modal-content .contact-info {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .error-modal-btn {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .error-modal-btn:hover {
            background-color: #0077ED;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }
    </style>
</head>

<body>
    <!-- 密码验证界面 -->
    <div class="password-overlay" id="password-overlay">
        <div class="password-container">
            <h2>访问验证</h2>
            <p>请关注公众号 <strong>MYAIGC</strong>，回复关键词 <strong>"n8n"</strong> 获取访问密码</p>
            
            <div class="qrcode-container">

    <!-- 错误提示弹窗 -->
    <div class="error-modal" id="error-modal">
        <div class="error-modal-content">
            <h3>资源不可用</h3>
            <p>目前资源已下架，请联系客服获取。</p>
            <div class="contact-info">客服微信：myaigcpro</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 密码验证相关变量 ---
            const CORRECT_PASSWORD = 'msfdimne8*!N8n@39sdf888!MyAIGCTemplatesasfdinljqwern';
            const COOKIE_NAME = 'n8n_access_verified';
            const COOKIE_EXPIRY_DAYS = 365;
            
            // --- 元素引用 ---
            const passwordOverlay = document.getElementById('password-overlay');
            const passwordInput = document.getElementById('password-input');
            const passwordSubmit = document.getElementById('password-submit');
            const passwordError = document.getElementById('password-error');
            const mainContentWrapper = document.getElementById('main-content-wrapper');
            
            const mainTitleEl = document.getElementById('main-title');
            const subTitleEl = document.getElementById('sub-title');
            const fileInput = document.getElementById('file-input');
            const uploadSection = document.getElementById('upload-section');
            const mainContent = document.getElementById('main-content');
            const searchInput = document.getElementById('search-input');
            const resultsContainer = document.getElementById('results-container');
            const totalCountSpan = document.createElement('span'); // Create span dynamically
            const filterTagsContainer = document.getElementById('filter-tags-container');

            let allWorkflows = [];
            let activeFilter = 'All';
            let currentPage = 1;
            let itemsPerPage = 50;
            let filteredWorkflows = [];

            // --- 密码验证函数 ---
            
            // 设置 Cookie
            function setCookie(name, value, days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                const expires = "expires=" + date.toUTCString();
                document.cookie = name + "=" + value + ";" + expires + ";path=/";
            }
            
            // 获取 Cookie
            function getCookie(name) {
                const nameEQ = name + "=";
                const ca = document.cookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
                }
                return null;
            }
            
            // 检查是否已验证
            function isVerified() {
                return getCookie(COOKIE_NAME) === 'true';
            }
            
            // 验证密码
            function verifyPassword() {
                const enteredPassword = passwordInput.value;
                
                if (enteredPassword === CORRECT_PASSWORD) {
                    // 设置验证状态
                    setCookie(COOKIE_NAME, 'true', COOKIE_EXPIRY_DAYS);
                    
                    // 隐藏验证界面，显示主内容
                    passwordOverlay.classList.add('hidden');
                    mainContentWrapper.classList.add('unlocked');
                    
                    // 初始化主应用
                    initializeMainApp();
                    
                    return true;
                } else {
                    // 显示错误信息
                    passwordError.textContent = '密码错误，请重新输入';
                    passwordInput.value = '';
                    passwordInput.focus();
                    
                    // 3秒后清除错误信息
                    setTimeout(() => {
                        passwordError.textContent = '';
                    }, 3000);
                    
                    return false;
                }
            }
            
            // 初始化主应用
            function initializeMainApp() {
                // 标题打字机效果
                typeWriter(mainTitleEl, 'N8n Workflow Templates', 60);
                
                // 自动加载 JSON 数据
                loadJSONData();
            }
            
            // 检查验证状态并初始化
            function checkVerificationAndInit() {
                if (isVerified()) {
                    // 已验证，直接显示主内容
                    passwordOverlay.classList.add('hidden');
                    mainContentWrapper.classList.add('unlocked');
                    initializeMainApp();
                } else {
                    // 未验证，显示验证界面
                    passwordOverlay.classList.remove('hidden');
                    mainContentWrapper.classList.remove('unlocked');
                    passwordInput.focus();
                }
            }

            // --- 函数 ---

            // 标题打字机效果
            function typeWriter(element, text, speed = 100) {
                let i = 0;
                element.innerHTML = '';
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    }
                }
                type();
            }

            // 加载 JSON 数据
            function loadJSONData() {
                // 尝试多个可能的路径
                const possiblePaths = [
                    './data/n8n-workflows.json',
                    '/data/n8n-workflows.json',
                    'data/n8n-workflows.json'
                ];
                
                let pathIndex = 0;
                
                function tryLoadData() {
                    if (pathIndex >= possiblePaths.length) {
                        console.error('所有路径都尝试失败');
                        subTitleEl.textContent = '数据加载失败，请确保通过服务器访问此页面';
                        return;
                    }
                    
                    const currentPath = possiblePaths[pathIndex];
                    console.log('尝试路径:', currentPath);
                    
                    fetch(currentPath)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`路径 ${currentPath} 加载失败`);
                            }
                            return response.json();
                        })
                        .then(data => {
                            allWorkflows = data;
                            // 初始化应用
                            initializeApp();
                        })
                        .catch(error => {
                            console.error(`路径 ${currentPath} 加载失败:`, error);
                            pathIndex++;
                            tryLoadData(); // 尝试下一个路径
                        });
                }
                
                tryLoadData();
            }

            // 应用初始化
            function initializeApp() {
                // 更新 UI
                subTitleEl.innerHTML = `共 <span id="total-count">${allWorkflows.length}</span> 个模板，实时筛选`;

                // 运行显示逻辑
                createFilterTags();
                updateDisplay();
            }

            // 渲染工作流卡片
            function displayWorkflows(workflows) {
                resultsContainer.innerHTML = '';
                if (workflows.length === 0) {
                    resultsContainer.innerHTML = `<div class="no-results"><p>未找到匹配的模板。</p><p>请尝试其他关键词或筛选标签。</p></div>`;
                    document.getElementById('pagination-container').style.display = 'none';
                    return;
                }
                
                // 计算分页
                const totalPages = Math.ceil(workflows.length / itemsPerPage);
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                const currentPageWorkflows = workflows.slice(startIndex, endIndex);
                
                // 渲染当前页的卡片
                const fragment = document.createDocumentFragment();
                currentPageWorkflows.forEach((workflow, index) => {
                    const card = document.createElement('div');
                    card.className = 'workflow-card';
                    card.style.animationDelay = `${index * 50}ms`;
                    const labelsHtml = (workflow.labels || '').split(/[,，]/)
                        .map(label => label.trim() ? `<span class="label">${label.trim()}</span>` : '')
                        .join('');
                    
                    // 创建下载按钮
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.innerHTML = '📥 下载模板';
                    downloadBtn.dataset.workflowName = workflow.name;
                    downloadBtn.addEventListener('click', () => downloadWorkflow(workflow.name));
                    
                    card.innerHTML = `<h3>${workflow.name}</h3><div class="labels">${labelsHtml}</div><p>${workflow.description}</p>`;
                    card.appendChild(downloadBtn);
                    fragment.appendChild(card);
                });
                resultsContainer.appendChild(fragment);
                
                // 渲染分页导航
                renderPagination(totalPages, workflows.length);
            }

            // 生成并渲染筛选标签
            function createFilterTags() {
                filterTagsContainer.innerHTML = '';
                const labelCounts = allWorkflows
                    .flatMap(w => (w.labels || '').split(/[,，]/).map(l => l.trim()).filter(l => l))
                    .reduce((acc, label) => {
                        acc[label] = (acc[label] || 0) + 1;
                        return acc;
                    }, {});

                const topLabels = Object.entries(labelCounts)
                    .sort(([, countA], [, countB]) => countB - countA)
                    .slice(0, 20)
                    .map(([label]) => label);

                const displayLabels = ['All', ...topLabels];

                displayLabels.forEach((label, index) => {
                    const tag = document.createElement('button');
                    tag.className = 'filter-tag';
                    tag.textContent = label;
                    tag.dataset.label = label;
                    tag.style.animationDelay = `${index * 40}ms`;
                    if (label === activeFilter) tag.classList.add('active');
                    filterTagsContainer.appendChild(tag);
                });
            }

            // 渲染分页导航
            function renderPagination(totalPages, totalItems) {
                const paginationContainer = document.getElementById('pagination-container');
                const prevBtn = document.getElementById('prev-page');
                const nextBtn = document.getElementById('next-page');
                const pageNumbers = document.getElementById('page-numbers');
                
                // 如果只有一页，隐藏分页
                if (totalPages <= 1) {
                    paginationContainer.style.display = 'none';
                    return;
                }
                
                paginationContainer.style.display = 'flex';
                
                // 更新上一页/下一页按钮状态
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
                
                // 清空页码
                pageNumbers.innerHTML = '';
                
                // 计算显示的页码范围
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                
                if (endPage - startPage < 4) {
                    startPage = Math.max(1, endPage - 4);
                }
                
                // 添加第一页和省略号
                if (startPage > 1) {
                    addPageNumber(1);
                    if (startPage > 2) {
                        const dots = document.createElement('span');
                        dots.className = 'pagination-info';
                        dots.textContent = '...';
                        pageNumbers.appendChild(dots);
                    }
                }
                
                // 添加页码
                for (let i = startPage; i <= endPage; i++) {
                    addPageNumber(i);
                }
                
                // 添加省略号和最后一页
                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        const dots = document.createElement('span');
                        dots.className = 'pagination-info';
                        dots.textContent = '...';
                        pageNumbers.appendChild(dots);
                    }
                    addPageNumber(totalPages);
                }
                
                // 添加页数信息
                const info = document.createElement('span');
                info.className = 'pagination-info';
                const startItem = (currentPage - 1) * itemsPerPage + 1;
                const endItem = Math.min(currentPage * itemsPerPage, totalItems);
                info.textContent = `${startItem}-${endItem} / ${totalItems}`;
                pageNumbers.appendChild(info);
                
                function addPageNumber(pageNum) {
                    const pageBtn = document.createElement('button');
                    pageBtn.className = 'page-number';
                    if (pageNum === currentPage) {
                        pageBtn.classList.add('active');
                    }
                    pageBtn.textContent = pageNum;
                    pageBtn.addEventListener('click', () => {
                        currentPage = pageNum;
                        updateDisplay();
                        // 滚动到顶部
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                    pageNumbers.appendChild(pageBtn);
                }
            }

            // 执行搜索和筛选
            function updateDisplay() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                let filteredByTag = allWorkflows;
                if (activeFilter !== 'All') {
                    filteredByTag = allWorkflows.filter(workflow =>
                        (workflow.labels || '').split(/[,，]/).map(l => l.trim()).includes(activeFilter)
                    );
                }
                let finalFiltered = filteredByTag;
                if (searchTerm) {
                    finalFiltered = filteredByTag.filter(w =>
                        (w.name.toLowerCase().includes(searchTerm) || (w.labels || '').toLowerCase().includes(searchTerm) || (w.description || '').toLowerCase().includes(searchTerm))
                    );
                }
                
                // 搜索时重置到第一页
                if (searchTerm || activeFilter !== 'All') {
                    currentPage = 1;
                }
                
                filteredWorkflows = finalFiltered;
                displayWorkflows(filteredWorkflows);
            }

            // --- 下载功能相关函数 ---
            
            // 检查文件是否存在
            async function checkFileExists(filename) {
                // 所有文件现在都在根目录，直接检查
                try {
                    const response = await fetch(`/workflows/${filename}`, { method: 'HEAD' });
                    if (response.ok) {
                        return { exists: true, path: `/workflows/${filename}` };
                    }
                } catch (error) {
                    console.error('检查文件时出错:', error);
                }

                return { exists: false, path: null };
            }
            
            // 显示错误弹窗
            function showErrorModal() {
                const errorModal = document.getElementById('error-modal');
                errorModal.classList.add('show');
            }
            
            // 隐藏错误弹窗
            function hideErrorModal() {
                const errorModal = document.getElementById('error-modal');
                errorModal.classList.remove('show');
            }
            
            // 下载工作流文件
            async function downloadWorkflow(filename) {
                // 查找对应的下载按钮
                const downloadBtn = document.querySelector(`[data-workflow-name="${filename}"]`);
                
                try {
                    // 设置下载中状态
                    if (downloadBtn) {
                        downloadBtn.classList.add('downloading');
                        downloadBtn.innerHTML = '准备下载';
                        downloadBtn.disabled = true;
                    }
                    
                    // 检查文件是否存在
                    const fileResult = await checkFileExists(filename);
                    
                    // 添加调试信息
                    console.log('=== 下载调试信息 ===');
                    console.log('文件名:', filename);
                    console.log('文件存在检查结果:', fileResult);
                    
                    if (!fileResult.exists) {
                        // 文件不存在，显示错误弹窗
                        showErrorModal();
                        // 恢复按钮状态
                        if (downloadBtn) {
                            downloadBtn.classList.remove('downloading');
                            downloadBtn.innerHTML = '📥 下载模板';
                            downloadBtn.disabled = false;
                        }
                        return;
                    }
                    
                    // 更新下载状态
                    if (downloadBtn) {
                        downloadBtn.innerHTML = '下载中';
                    }
                    
                    // 获取文件内容（使用实际路径）
                    console.log('请求路径:', fileResult.path);
                    const response = await fetch(fileResult.path);
                    
                    // 添加详细的响应调试信息
                    console.log('=== 响应调试信息 ===');
                    console.log('响应状态码:', response.status);
                    console.log('响应状态文本:', response.statusText);
                    console.log('响应头:', [...response.headers.entries()]);
                    console.log('Content-Type:', response.headers.get('content-type'));
                    
                    if (!response.ok) {
                        throw new Error(`下载失败: ${response.status}`);
                    }
                    
                    // 检查响应内容类型
                    const contentType = response.headers.get('content-type');
                    console.log('Content-Type:', contentType);
                    
                    if (contentType && contentType.includes('text/html')) {
                        console.warn('警告：响应内容是 HTML，不是 JSON 文件！');
                        console.log('响应内容预览（前200字符）:');
                        const text = await response.text();
                        console.log(text.substring(0, 200));
                        
                        // 显示错误弹窗
                        showErrorModal();
                        // 恢复按钮状态
                        if (downloadBtn) {
                            downloadBtn.classList.remove('downloading');
                            downloadBtn.innerHTML = '📥 下载模板';
                            downloadBtn.disabled = false;
                        }
                        return;
                    }
                    
                    const blob = await response.blob();
                    
                    // 创建下载链接
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    
                    // 清理
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    // 恢复按钮状态
                    if (downloadBtn) {
                        downloadBtn.classList.remove('downloading');
                        downloadBtn.innerHTML = 'debug: 下载成功';
                        downloadBtn.disabled = false;
                    }
                    
                } catch (error) {
                    console.error('下载出错:', error);
                    console.log('错误详情:', error.stack);
                    // 显示错误弹窗
                    showErrorModal();
                    // 恢复按钮状态
                    if (downloadBtn) {
                        downloadBtn.classList.remove('downloading');
                        downloadBtn.innerHTML = '📥 下载模板';
                        downloadBtn.disabled = false;
                    }
                }
            }

            // --- 密码验证事件监听 ---
            passwordSubmit.addEventListener('click', verifyPassword);
            
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    verifyPassword();
                }
            });
            
            // --- 错误弹窗事件监听 ---
            document.getElementById('error-modal-btn').addEventListener('click', hideErrorModal);
            
            // 点击弹窗背景关闭弹窗
            document.getElementById('error-modal').addEventListener('click', (e) => {
                if (e.target.id === 'error-modal') {
                    hideErrorModal();
                }
            });
            
            // --- 主应用事件监听 ---
            filterTagsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-tag')) {
                    const currentActive = filterTagsContainer.querySelector('.active');
                    if (currentActive) currentActive.classList.remove('active');
                    e.target.classList.add('active');
                    activeFilter = e.target.dataset.label;
                    updateDisplay();
                }
            });

            searchInput.addEventListener('input', updateDisplay);
            
            // 分页按钮事件
            document.getElementById('prev-page').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    updateDisplay();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
            
            document.getElementById('next-page').addEventListener('click', () => {
                const totalPages = Math.ceil(filteredWorkflows.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    updateDisplay();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // --- 页面初始加载 ---
            // 检查验证状态并初始化
            checkVerificationAndInit();
        });
    </script>
